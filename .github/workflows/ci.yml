# This workflow handles Maven CI, Central publishing, Sonar analysis, and
# site artifact upload for commons-lang.

name: Java CI with Maven

on:
  push:
    branches:
      - master
  pull_request:
    types: [ opened, synchronize, reopened ]

env:
  AWS_REGION: ${{ secrets.AWS_REGION }}
  SITE_S3_URI: ${{ secrets.SITE_S3_URI }}

jobs:
  build:
    permissions:
      id-token: write
      contents: read

    runs-on: ubuntu-latest

    env:
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

    steps:

      - name: Source checkout
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: "17"
          distribution: "temurin"
          cache: "maven"
          server-id: central
          server-username: MAVEN_USERNAME
          server-password: MAVEN_CENTRAL_TOKEN
          gpg-private-key: ${{ secrets.MAVEN_GPG_PRIVATE_KEY }}
          gpg-passphrase: MAVEN_GPG_PASSPHRASE

      - name: Cache SonarCloud packages
        uses: actions/cache@v4
        with:
          path: ~/.sonar/cache
          key: ${{ runner.os }}-sonar
          restore-keys: ${{ runner.os }}-sonar

      - name: Build and test (PR)
        if: >
          github.event_name == 'pull_request' && (env.SONAR_TOKEN == '' ||
          github.event.pull_request.head.repo.full_name != github.repository ||
          contains(github.actor, '[bot]'))
        run: mvn -B verify -Dgpg.skip=true

      - name: Build, test and analyze (PR)
        if: >
          github.event_name == 'pull_request' && env.SONAR_TOKEN != '' &&
          github.event.pull_request.head.repo.full_name == github.repository &&
          !contains(github.actor, '[bot]')
        run: mvn -B verify
          org.sonarsource.scanner.maven:sonar-maven-plugin:5.5.0.6356:sonar
          -Dsonar.projectKey=Norconex_commons-lang -Dsonar.qualitygate.wait=true
          -Dsonar.qualitygate.timeout=900 -Dgpg.skip=true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build, test and analyze (push to master)
        if: github.event_name == 'push'
        run: mvn -B verify
          org.sonarsource.scanner.maven:sonar-maven-plugin:5.5.0.6356:sonar
          -Dsonar.projectKey=Norconex_commons-lang -Dsonar.qualitygate.wait=true
          -Dsonar.qualitygate.timeout=900 -Dgpg.skip=true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and publish (push to master)
        if: github.event_name == 'push'
        run: mvn -B deploy -DskipTests
        env:
          MAVEN_USERNAME: ${{ secrets.OSSRH_USERNAME }}
          MAVEN_CENTRAL_TOKEN: ${{ secrets.OSSRH_TOKEN }}
          MAVEN_GPG_PASSPHRASE: ${{ secrets.MAVEN_GPG_PASSPHRASE }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@67fbcbb121271f7775d2e7715933280b06314838 # v1
        with:
          role-to-assume: ${{ secrets.AWS_ROLE }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Copy site resources to s3
        run: |
          aws s3 cp /home/runner/work/commons-lang/commons-lang/target/site/CHANGES.xml ${{ env.SITE_S3_URI }}commons/lang/v3/
